<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do Service</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>TaskManager 📝</h1>

  <p>
    Welcome to our To-Do List service! We help you stay organized by managing your
    daily tasks efficiently. Enter your task along with your phone number so you
    can keep track of your activities anytime.
  </p>

  <h3>Enter Your Task</h3>

  <input type="text" id="task" placeholder="Enter your task">
  <input type="text" id="phone" placeholder="Enter your phone number">

  <button onclick="saveData()">Submit</button>
</div>

<script>
function saveData() {
  const task = document.getElementById("task").value.trim();
  const phone = document.getElementById("phone").value.trim();

  if (task === "" || phone === "") {
    alert("Please fill all fields!");
    return;
  }

  const data = { task, phone };

  // Save to localStorage
  localStorage.setItem("userData", JSON.stringify(data));

  // Go to next page
  window.location.href = "view.html";
}
</script>

</body>
</html>
